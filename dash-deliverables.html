<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pH Data Challenge Tracker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Inline SVG Icons (Replacing lucide-react for the single HTML constraint)
        const IconWrapper = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const CheckCircle2 = ({ className }) => <IconWrapper className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></IconWrapper>;
        const Circle = ({ className }) => <IconWrapper className={className}><circle cx="12" cy="12" r="10"></circle></IconWrapper>;
        const Target = ({ className }) => <IconWrapper className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></IconWrapper>;
        const Cloud = ({ className }) => <IconWrapper className={className}><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></IconWrapper>;
        const Cpu = ({ className }) => <IconWrapper className={className}><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></IconWrapper>;
        const Users = ({ className }) => <IconWrapper className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconWrapper>;
        const Briefcase = ({ className }) => <IconWrapper className={className}><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></IconWrapper>;
        const Code2 = ({ className }) => <IconWrapper className={className}><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></IconWrapper>;
        const AlertCircle = ({ className }) => <IconWrapper className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></IconWrapper>;

        const tasksData = {
            deliverables: [
                { id: 'd1', text: 'Wrap basic Python ML model into a REST API' },
                { id: 'd2', text: 'API must accept house details and return price estimates' },
                { id: 'd3', text: 'Automatically join ZIP code demographic data behind the scenes' },
                { id: 'd4', text: 'Create a test script sending house data to API to prove it works' },
                { id: 'd5', text: 'Evaluate provided model (accuracy, under/overfitting, complexity)' },
                { id: 'd6', text: 'Document suggested improvements (features, hyperparameter tuning)' },
            ],
            mlops: [
                { id: 'm1', text: 'Design for AWS (preferred) or your strongest cloud platform' },
                { id: 'm2', text: 'Decide and justify Docker usage (why/why not)' },
                { id: 'm3', text: 'Define scaling strategy and model update lifecycle' },
                { id: 'm4', text: 'Address Model Registries and Feature Stores' },
                { id: 'm5', text: 'Outline CI/CD pipeline for the ML lifecycle' },
                { id: 'm6', text: 'Address security, monitoring, and versioning in production' },
            ],
            business_presentation: [
                { id: 'b1', text: 'Assume audience is Real Estate Professionals (Hiring Panel in disguise)' },
                { id: 'b2', text: 'Keep it high-level and clear (no deep code walkthroughs)' },
                { id: 'b3', text: 'Focus strictly on business value (e.g., saving time estimating prices)' },
                { id: 'b4', text: 'Explain how the tool fits into their existing business process' },
                { id: 'b5', text: 'Highlight business outcomes and ROI over technical specs' },
            ],
            technical_presentation: [
                { id: 't1', text: 'Dive deep into API architecture and design decisions' },
                { id: 't2', text: 'Explain tradeoffs made (e.g., speed vs. accuracy, cost vs. scale)' },
                { id: 't3', text: 'Discuss performance measurement metrics used' },
                { id: 't4', text: 'Demonstrate operational breadth and depth in AWS/Cloud' },
                { id: 't5', text: 'Be prepared to explain ANY generated AI code in meticulous detail' },
            ],
            mindset_qa: [
                { id: 'q1', text: 'Prioritize simplicity: build the simplest working solution first' },
                { id: 'q2', text: 'Show curiosity, humility, and cultural alignment' },
                { id: 'q3', text: 'Prepare questions about day-to-day work at pH Data' },
                { id: 'q4', text: 'Ask what makes the team excited to work there' },
                { id: 'q5', text: 'Remember: They want to see HOW you think, not just a perfect code file' },
            ]
        };

        function App() {
            const [activeTab, setActiveTab] = useState('deliverables');
            const [completedTasks, setCompletedTasks] = useState(new Set());

            const toggleTask = (taskId) => {
                const newCompleted = new Set(completedTasks);
                if (newCompleted.has(taskId)) {
                    newCompleted.delete(taskId);
                } else {
                    newCompleted.add(taskId);
                }
                setCompletedTasks(newCompleted);
            };

            const getProgress = (category) => {
                const total = tasksData[category].length;
                const completed = tasksData[category].filter(t => completedTasks.has(t.id)).length;
                return Math.round((completed / total) * 100);
            };

            const tabs = [
                { id: 'deliverables', icon: Code2, label: 'Core Deliverables' },
                { id: 'mlops', icon: Cloud, label: 'MLOps & Architecture' },
                { id: 'business_presentation', icon: Briefcase, label: 'Business Pitch' },
                { id: 'technical_presentation', icon: Cpu, label: 'Technical Pitch' },
                { id: 'mindset_qa', icon: Users, label: 'Mindset & Q&A' },
            ];

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-5xl mx-auto space-y-6">
                        
                        {/* Header */}
                        <header className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                            <div>
                                <h1 className="text-2xl md:text-3xl font-bold text-slate-800 tracking-tight">
                                    pH Data Challenge Tracker
                                </h1>
                                <p className="text-slate-500 mt-1 font-medium">
                                    Executive Preparation Dashboard
                                </p>
                            </div>
                            <div className="bg-indigo-50 border border-indigo-100 px-4 py-3 rounded-xl flex items-center gap-3 w-full md:w-auto">
                                <AlertCircle className="text-indigo-600 w-5 h-5 flex-shrink-0" />
                                <span className="text-sm text-indigo-900 font-medium">
                                    Goal: Simplicity, solid reasoning, & clear communication.
                                </span>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                            
                            {/* Sidebar Navigation */}
                            <nav className="lg:col-span-1 flex flex-col gap-2">
                                {tabs.map((tab) => {
                                    const Icon = tab.icon;
                                    const isActive = activeTab === tab.id;
                                    const progress = getProgress(tab.id);
                                    
                                    return (
                                        <button
                                            key={tab.id}
                                            onClick={() => setActiveTab(tab.id)}
                                            className={`flex flex-col text-left p-4 rounded-xl border transition-all ${
                                                isActive 
                                                    ? 'bg-indigo-600 border-indigo-700 text-white shadow-md' 
                                                    : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50 hover:border-slate-300'
                                            }`}
                                        >
                                            <div className="flex items-center gap-3 font-semibold mb-2">
                                                <Icon className="w-5 h-5" />
                                                {tab.label}
                                            </div>
                                            <div className="w-full bg-black/10 rounded-full h-1.5 mt-auto">
                                                <div 
                                                    className={`h-1.5 rounded-full transition-all duration-500 ${isActive ? 'bg-white' : 'bg-indigo-500'}`} 
                                                    style={{ width: `${progress}%` }}
                                                />
                                            </div>
                                        </button>
                                    );
                                })}
                            </nav>

                            {/* Main Content Area */}
                            <main className="lg:col-span-3 bg-white border border-slate-200 rounded-2xl shadow-sm p-6 md:p-8">
                                <div className="flex items-center gap-3 mb-6 pb-4 border-b border-slate-100">
                                    <Target className="text-indigo-600 w-6 h-6" />
                                    <h2 className="text-xl font-bold text-slate-800 capitalize">
                                        {activeTab.replace('_', ' ')} Checklist
                                    </h2>
                                </div>

                                <div className="space-y-3">
                                    {tasksData[activeTab].map((task) => {
                                        const isCompleted = completedTasks.has(task.id);
                                        return (
                                            <div 
                                                key={task.id}
                                                onClick={() => toggleTask(task.id)}
                                                className={`flex items-start gap-4 p-4 rounded-xl border cursor-pointer transition-all ${
                                                    isCompleted 
                                                        ? 'bg-slate-50 border-slate-200' 
                                                        : 'bg-white border-slate-200 hover:border-indigo-300 hover:shadow-sm'
                                                }`}
                                            >
                                                <button className="mt-0.5 focus:outline-none flex-shrink-0">
                                                    {isCompleted ? (
                                                        <CheckCircle2 className="w-6 h-6 text-emerald-500" />
                                                    ) : (
                                                        <Circle className="w-6 h-6 text-slate-300" />
                                                    )}
                                                </button>
                                                <span className={`text-base font-medium transition-colors ${
                                                    isCompleted ? 'text-slate-400 line-through' : 'text-slate-700'
                                                }`}>
                                                    {task.text}
                                                </span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </main>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
